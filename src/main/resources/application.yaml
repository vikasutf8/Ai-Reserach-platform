spring:
  application:
    name: Ai-Research-Agent
  config:
#    import: optional:classpath:application-${spring.profiles.active}.yaml
    import: optional:file:.env[.properties]


#  DB_USERNAME=
#  DB_PASSWORD=
#  DB_HOST=
#  DB_PORT=
#  DB_NAME=
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ai_research_agent}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
        ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
